<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Transfer Login</title>
    <meta name="theme-color" content="#062b49">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/photo-page-icon-180.png">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="login-page">
    <main class="login-card">
      <p class="eyebrow">Private Appraisal Photos</p>
      <h1>Photo Transfer</h1>
      <p class="muted">Sign in to upload, review, and download appraisal field photos.</p>
      <form method="post" class="login-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required autofocus>
        </label>
        {% if error %}
          <p class="error">{{ error }}</p>
        {% endif %}
        <button type="submit">Sign In</button>
      </form>
    </main>
  </body>
</html>
